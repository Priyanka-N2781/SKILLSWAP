[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "dist/functions"

[build.environment]
  NETLIFY = "true"

[functions]
  node_bundler = "esbuild"
  
# Route all API requests to our serverless function (`dist/index.mjs`)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

# Redirect frontend routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

